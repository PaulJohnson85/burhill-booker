<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burhill Booker — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: #0f1f0f; }</style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-100 font-sans px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⛳</div>
      <h1 class="text-2xl font-bold text-white">Burhill Booker</h1>
      <p class="text-green-400 text-sm mt-1">Automated Tee Time Reservations</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm
          {% if cat == 'error' %}bg-red-900/60 border border-red-700 text-red-200
          {% else %}bg-green-900/60 border border-green-700 text-green-200{% endif %}">
          {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <!-- Card -->
    <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)"
         class="rounded-2xl p-8">
      <h2 class="text-lg font-semibold text-white mb-6">Sign in to your account</h2>
      <form method="post">
        <div class="mb-4">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Email</label>
          <input type="email" name="email" required autocomplete="email"
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white
                   focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500">
        </div>
        <div class="mb-6">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white
                   focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500">
        </div>
        <button type="submit"
          class="w-full bg-green-700 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="text-green-400 hover:text-green-300 font-semibold">Create one</a>
    </p>
  </div>
</body>
</html>
